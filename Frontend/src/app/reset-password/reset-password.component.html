<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Medical App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="medical-bg min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-lg shadow-lg overflow-hidden">
    <!-- Header -->
    <div class="p-5 border-b bg-teal-600 text-white">
      <h2 class="text-2xl font-bold">Reset Password</h2>
      <p class="text-teal-100">Medical App</p>
    </div>

    <!-- Content -->
    <div class="p-6 space-y-4">
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">email</label>
        <input
          type="email"
          id="email"
          placeholder="email"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500"
          [(ngModel)]="email"
          name="email"
        >
      </div>
      <!-- Password Field -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
        <input
          type="password"
          id="password"
          placeholder="New Password"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500"
          [(ngModel)]="password"
          name="password"
        >
      </div>

      <!-- Confirm Password Field -->
      <div>
        <label for="password_confirmation" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <input
          type="password"
          id="password_confirmation"
          placeholder="Confirm Password"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500"
          [(ngModel)]="password_confirmation"
          name="password_confirmation"
        >
      </div>

      <!-- Simple Password Requirements -->
      <div class="text-sm text-gray-600">
        <p>Password must contain at least 8 characters including uppercase, lowercase, numbers, and special characters.</p>
      </div>
    </div>

    <!-- Footer -->
    <div class="px-6 py-4 bg-gray-50 border-t">
      <button
        (click)="onSubmit()"
        class="w-full py-2 px-4 bg-teal-600 hover:bg-teal-700 text-white font-medium rounded-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 transition-colors"
      >
        Reset Password
      </button>
    </div>
  </div>

  <script src="https://code.angularjs.org/9.1.0/angular.min.js"></script>
</body>
</html>
