<app-sidebar class="fixed"></app-sidebar>
<app-header class="fixed top-0 left-0 right-0 h-16 z-10"></app-header>
<div class="min-h-screen bg-gray-50 pt-24 pb-12 px-4 sm:px-6 lg:px-8 ml-[var(--sidebar-width,16rem)]">
  <div class="max-w-3xl w-full mx-auto">
    <!-- Logo/Header -->
    <div class="text-center mb-8">
      <h2 class="text-4xl font-extrabold text-teal-600">MediCare</h2>
      <p class="mt-2 text-sm text-gray-600">Patient Registration Portal</p>
    </div>

    <!-- Card Container -->
    <div class="bg-white rounded-xl shadow-xl overflow-hidden border border-gray-100">
      <div class="px-8 py-10">
        <h3 class="text-2xl font-semibold text-gray-900 mb-8">Create New Patient</h3>

        <form (ngSubmit)="CreatePatient()" #patientForm="ngForm" class="space-y-7">
          <!-- Full Name -->
          <div>
            <label for="userName" class="block text-sm font-medium text-gray-700 mb-1.5">Full Name</label>
            <div class="relative rounded-md shadow-sm">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
              </div>
              <input
                type="text"
                id="userName"
                name="userName"
                [(ngModel)]="UserName"
                required
                class="pl-10 block w-full rounded-lg border-gray-300 shadow-sm focus:ring-teal-500 focus:border-teal-500 sm:text-sm h-11"
                placeholder="John Doe">
            </div>
          </div>

          <!-- Email -->
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
            <div class="relative rounded-md shadow-sm">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
              </div>
              <input
                type="email"
                id="email"
                name="email"
                [(ngModel)]="Email"
                required
                class="pl-10 block w-full rounded-lg border-gray-300 shadow-sm focus:ring-teal-500 focus:border-teal-500 sm:text-sm h-11"
                placeholder="patient@example.com">
            </div>
          </div>

          <!-- Password -->
          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
            <div class="relative rounded-md shadow-sm">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
              </div>
              <input
                type="password"
                id="password"
                name="password"
                [(ngModel)]="Password"
                required
                class="pl-10 block w-full rounded-lg border-gray-300 shadow-sm focus:ring-teal-500 focus:border-teal-500 sm:text-sm h-11"
                placeholder="••••••••">
            </div>
          </div>

          <!-- Submit Button -->
          <div class="pt-2">
            <button
              type="submit"
              [disabled]="!patientForm.form.valid"
              class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-teal-600 hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
              Register Patient
            </button>
          </div>
        </form>

        <!-- Additional Info -->
        <div class="mt-8">
          <div class="relative">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-gray-300"></div>
            </div>
            <div class="relative flex justify-center text-sm">
              <span class="px-4 bg-white text-gray-500 font-medium">Important Information</span>
            </div>
          </div>
          <p class="mt-4 text-xs text-gray-500 text-center max-w-lg mx-auto">
            By registering a patient, you confirm that you have obtained proper consent
            and are authorized to create this account in accordance with healthcare regulations.
          </p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="mt-10 text-center">
      <p class="text-xs text-gray-500">
        © 2025 MediCare Health Systems. All rights reserved.
      </p>
    </div>
  </div>
</div>
