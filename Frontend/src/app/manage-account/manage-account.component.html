<app-sidebar class="fixed "></app-sidebar>
<app-header class="fixed left-0 right-0 top-0 "></app-header>
<div class="min-h-screen from-indigo-50 to-blue-100 py-10 px-4 sm:px-6 lg:px-8 ml-60 mt-10">
  <div class="max-w-7xl mx-auto">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
      <div class="px-8 py-6 bg-gradient-to-r from-blue-600 to-indigo-600 text-white">
        <div class="flex justify-between items-center">
          <div>
            <h1 class="text-2xl font-bold">Users List</h1>
          </div>
          <div class="flex space-x-3 items-center">
            <div class="relative">
              <input
                type="text"
                placeholder="Search users..."
                class="px-4 py-2 pr-8 rounded-lg text-sm bg-white text-gray-800 placeholder-gray-500 border-none focus:outline-none focus:ring-2 focus:ring-blue-300 transition-all duration-200 w-56"
                (input)="filterPatients($event)"
              />
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500 absolute right-3 top-2.5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
              </svg>
            </div>
          </div>
        </div>
      </div>

      <!-- Optional loading indicator -->
      <div *ngIf="loading" class="flex justify-center my-8">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
      </div>

      <!-- Error message display -->
      <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mt-4 mx-8">
        <span class="block sm:inline">{{ errorMessage }}</span>
      </div>
      <div class="px-6 py-8 sm:px-8">
        <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Account Management</h2>
        <p class="text-gray-500 mb-6">Manage user accounts</p>
        <!-- User Table -->
        <div class="overflow-x-auto bg-white rounded-xl shadow-md border border-gray-100">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Role</th>
                <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
              </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
              <tr *ngFor="let user of displayedUsers" class="hover:bg-gray-50 transition-colors duration-150">
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ user.name }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm">
                  <span class="px-2 py-1 text-xs font-medium rounded-full"
                    [ngClass]="{'bg-purple-100 text-purple-800': user.role === 'admin', 'bg-blue-100 text-blue-800': user.role !== 'admin'}">
                    {{ user.role }}
                  </span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ user.email }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium space-x-2">
                  <button
                    class="inline-flex items-center px-3 py-1.5 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors duration-150"
                    (click)="openModal(user)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    Edit
                  </button>
                  <button
                    class="inline-flex items-center px-3 py-1.5 border border-transparent text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-colors duration-150"
                    (click)="deleteUser(user.id)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    Delete
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <!-- Pagination Section -->
        <div class="bg-gray-50 px-8 py-4 flex items-center justify-between border-t border-gray-200">
          <div class="flex items-center">
            <p class="text-sm text-gray-700">
              Showing page <span class="font-medium">{{ curentPage }}</span> of <span class="font-medium">{{ LastPage }}</span>
            </p>
          </div>
          <div class="flex space-x-2">
            <!-- Previous Page Button -->
            <button
              [disabled]="curentPage === 1"
              (click)="changePage(curentPage - 1)"
              class="px-3 py-1.5 rounded-md border text-gray-500 transition-colors duration-200"
              [ngClass]="{
                'bg-gray-100 border-gray-200 cursor-not-allowed': curentPage === 1,
                'bg-white border-gray-200 hover:bg-gray-50': curentPage !== 1
              }"
            >
              Previous
            </button>

            <!-- First Page Button -->
            <button
              (click)="changePage(1)"
              class="px-3 py-1.5 rounded-md border transition-colors duration-200"
              [ngClass]="{
                'bg-indigo-600 border-indigo-600 text-white font-medium': curentPage === 1,
                'bg-white border-gray-200 text-gray-700 hover:bg-gray-50': curentPage !== 1
              }"
            >
              1
            </button>

            <!-- Ellipsis for large gaps at the start -->
            <span *ngIf="curentPage > 3" class="px-3 py-1.5 text-gray-500">...</span>

            <!-- Page before current -->
            <button
              *ngIf="curentPage > 2"
              (click)="changePage(curentPage - 1)"
              class="px-3 py-1.5 bg-white rounded-md border border-gray-200 text-gray-700 hover:bg-gray-50 transition-colors duration-200"
            >
              {{ curentPage - 1 }}
            </button>

            <!-- Current Page -->
            <button
              *ngIf="curentPage !== 1 && curentPage !== LastPage"
              class="px-3 py-1.5 bg-indigo-600 rounded-md border border-indigo-600 text-white font-medium"
            >
              {{ curentPage }}
            </button>

            <!-- Page after current -->
            <button
              *ngIf="curentPage < LastPage - 1"
              (click)="changePage(curentPage + 1)"
              class="px-3 py-1.5 bg-white rounded-md border border-gray-200 text-gray-700 hover:bg-gray-50 transition-colors duration-200"
            >
              {{ curentPage + 1 }}
            </button>

            <!-- Ellipsis for large gaps at the end -->
            <span *ngIf="curentPage < LastPage - 2" class="px-3 py-1.5 text-gray-500">...</span>

            <!-- Last Page Button -->
            <button
              *ngIf="LastPage > 1"
              (click)="changePage(LastPage)"
              class="px-3 py-1.5 rounded-md border transition-colors duration-200"
              [ngClass]="{
                'bg-indigo-600 border-indigo-600 text-white font-medium': curentPage === LastPage,
                'bg-white border-gray-200 text-gray-700 hover:bg-gray-50': curentPage !== LastPage
              }"
            >
              {{ LastPage }}
            </button>

            <!-- Next Page Button -->
            <button
              [disabled]="curentPage === LastPage"
              (click)="changePage(curentPage + 1)"
              class="px-3 py-1.5 rounded-md border text-gray-500 transition-colors duration-200"
              [ngClass]="{
                'bg-gray-100 border-gray-200 cursor-not-allowed': curentPage === LastPage,
                'bg-white border-gray-200 hover:bg-gray-50': curentPage !== LastPage
              }"
            >
              Next
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Edit User Modal -->
<div class="fixed inset-0 bg-gray-600 bg-opacity-75 flex items-center justify-center z-50 transition-opacity duration-300" *ngIf="showModal">
  <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md mx-4 transform transition-all duration-300">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-2xl font-semibold text-gray-900">
        Edit User
      </h3>
      <button
        class="text-gray-400 hover:text-gray-500 focus:outline-none transition-colors duration-150"
        (click)="closeModal()">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <form>
      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-bold mb-2" for="name">Name</label>
        <input
          [(ngModel)]="selectedUser.name"
          name="name"
          id="name"
          class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors duration-150"
          required
        />
      </div>

      <div class="mb-6">
        <label class="block text-gray-700 text-sm font-bold mb-2" for="email">Email</label>
        <input
          [(ngModel)]="selectedUser.email"
          name="email"
          id="email"
          type="email"
          class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors duration-150"
          required
        />
      </div>
      <div class="flex justify-end space-x-3">
        <button
          type="button"
          class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors duration-150"
          (click)="closeModal()">
          Cancel
        </button>
        <button
          type="submit"
          class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors duration-150"
          (click)="updateUser()">
          Save Changes
        </button>
      </div>
    </form>
  </div>
</div>
