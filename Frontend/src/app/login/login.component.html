<div class="flex min-h-screen flex-col md:flex-row">
  <!-- Left side with medical image -->
  <div class="relative flex-1 bg-slate-100">
    <img
      src="assets/images/background.jpg"
      alt="Medical Background"
      class="h-full w-full object-cover"
    />
  </div>

  <!-- Right side with login form -->
  <div class="flex flex-1 flex-col items-center justify-center p-8 md:p-12">
    <div class="w-full max-w-md space-y-8">
      <!-- Logo -->
      <div class="flex justify-center">
        <div class="flex items-center gap-2">
          <div class="h-10 w-10 rounded-full bg-gradient-to-br from-teal-500 to-cyan-600 p-2">
            <svg viewBox="0 0 24 24" class="h-full w-full text-white" fill="currentColor">
              <path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z" />
            </svg>
          </div>
          <div class="text-sm font-medium">
            <div class="text-teal-600">Timmerman</div>
            <div class="text-slate-600">HealthCare</div>
          </div>
        </div>
      </div>

      <!-- Form content -->
      <div class="space-y-6">
        <div class="space-y-2 text-center">
          <h1 class="text-2xl font-bold tracking-tight text-slate-900">Welcome to Timmerman Health</h1>
          <p class="text-sm text-slate-600">Secure login for healthcare professionals and patients</p>
        </div>

        <!-- Login Form -->
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
          <!-- Error Message -->
          <div *ngIf="errorMessage" class="rounded-md bg-red-50 p-3 text-sm text-red-600">
            {{ errorMessage }}
          </div>

          <!-- Email Field -->
          <div class="space-y-2">
            <label for="email" class="text-sm font-medium text-slate-700">Email:</label>
            <input
              id="email"
              type="email"
              formControlName="email"
              class="w-full rounded-md border border-slate-200 p-2 focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500"
              [ngClass]="{'border-red-500': loginForm.get('email')?.invalid && loginForm.get('email')?.touched}"
            />
            <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-xs text-red-600">
              <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required</span>
              <span *ngIf="loginForm.get('email')?.errors?.['email']">Please enter a valid email address</span>
            </div>
          </div>

          <!-- Password Field -->
          <div class="space-y-2">
            <label for="password" class="text-sm font-medium text-slate-700">Password:</label>
            <input
              id="password"
              type="password"
              formControlName="password"
              class="w-full rounded-md border border-slate-200 p-2 focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500"
              [ngClass]="{'border-red-500': loginForm.get('password')?.invalid && loginForm.get('password')?.touched}"
            />
            <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-xs text-red-600">
              <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required</span>
            </div>
          </div>

          <!-- Login Button -->
          <button
            type="submit"
            class="w-full rounded-md bg-teal-500 py-2 text-white transition-colors hover:bg-teal-600 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 disabled:opacity-70"
            [disabled]="loginForm.invalid || loading"
          >
            <span *ngIf="!loading">Login</span>
            <span *ngIf="loading" class="flex items-center justify-center">
              <svg class="mr-2 h-4 w-4 animate-spin" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Processing...
            </span>
          </button>

          <!-- Links -->
          <div class="flex justify-between text-sm">
            <button><a href="app-forget-password" class="text-teal-600 hover:underline">Forgot Password?</a></button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
