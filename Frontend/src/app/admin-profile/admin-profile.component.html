<!-- Main Layout Container -->
<div class="flex min-h-screen bg-gray-100">
  <!-- Sidebar -->
  <app-sidebar class="fixed left-0 top-0 h-full w-64 z-20"></app-sidebar>

  <!-- Main Content Area -->
  <div class="flex-1 ml-64"> <!-- Adding margin-left equal to sidebar width -->
    <!-- Header -->
    <app-header class="fixed top-0 left-0 right-0 h-16 z-10"></app-header>

    <!-- Profile Content with proper spacing from header -->
    <main class="pt-24 px-8 pb-12 "> <!-- Adding padding-top to account for header height + spacing -->
      <div class="max-w-4xl mx-auto bg-white rounded-lg shadow p-6">
        <!-- Profile Avatar Section -->


        <!-- Doctor Profile Section -->
        <div class="mb-8">
          <h2 class="text-xl font-medium text-gray-700 mb-4">Doctor Profile</h2>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
              <label for="businessName" class="block text-gray-700 mb-1">Doctor Name</label>
              <input
                type="text"
                id="businessName"
                [(ngModel)]="user.name"
                class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
              >
            </div>

            <div>
              <label for="phone_number" class="block text-gray-700 mb-1">Phone Number</label>
              <input
                type="tel"
                id="phone_number"
                [(ngModel)]="user.phone_number"
                pattern="[0-9]*"
                placeholder="Enter your phone number"
                class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
              >
            </div>

            <div>
              <label for="location" class="block text-gray-700 mb-1">Location</label>
              <input
                type="text"
                id="location"
                [(ngModel)]="user.country"
                class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
              >
            </div>
          </div>
        </div>

        <!-- Email Section -->
        <div class="mb-8">
          <h2 class="text-xl font-medium text-gray-700 mb-1">Email</h2>
          <p class="text-gray-500 text-sm mb-3">This contact will be shown to others publicly, so choose it carefully.</p>

          <div class="flex gap-3">
            <input
              type="email"
              [(ngModel)]="user.email"
              class="flex-grow border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
            >
          </div>
        </div>

        <!-- Password Section -->
        <div class="mb-8">
          <h2 class="text-xl font-medium text-gray-700 mb-1">Password</h2>
          <p class="text-gray-500 text-sm mb-3">You can update your password below.</p>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
              <label for="currentPassword" class="block text-gray-700 mb-1">Current Password</label>
              <input
                type="password"
                id="currentPassword"
                [(ngModel)]="passwordForm.currentPassword"
                class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                placeholder="Enter current password"
              >
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="newPassword" class="block text-gray-700 mb-1">New Password</label>
              <input
                type="password"
                id="newPassword"
                [(ngModel)]="passwordForm.newPassword"
                class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                placeholder="Enter new password"
              >
            </div>
            <div>
              <label for="confirmPassword" class="block text-gray-700 mb-1">Confirm New Password</label>
              <input
                type="password"
                id="confirmPassword"
                [(ngModel)]="passwordForm.confirmPassword"
                class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                placeholder="Confirm new password"
              >
            </div>
          </div>

          <div class="mt-4">
            <button
              type="button"
              (click)="updatePassword()"
              class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 focus:ring-2 focus:ring-blue-300 focus:outline-none"
            >
              Update Password
            </button>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex justify-end gap-3">
          <button type="button" class="px-5 py-2 border border-gray-300 rounded hover:bg-gray-50">
            Cancel
          </button>
          <button
            type="button"
            (click)="updateUserInfo()"
            class="px-5 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 focus:ring-2 focus:ring-blue-300 focus:outline-none"
          >
            Save Changes
          </button>
        </div>
      </div>
    </main>
  </div>
</div>
