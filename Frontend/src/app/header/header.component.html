<main class="flex-1 flex flex-col overflow-hidden bg-gray-50 ml-64">
  <!-- Top Navigation Bar -->
  <header class="bg-white shadow-sm px-4 md:px-6 py-3 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center">
      <h2 class="text-lg md:text-xl font-medium text-gray-800">Dashboard</h2>
      <span class="ml-2 md:ml-4 px-2 md:px-3 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
        Doctor {{name}}
      </span>
    </div>

    <div class="flex items-center space-x-2 md:space-x-4">
      <!-- Search Input -->
<div class="relative hidden md:block">
  <input
    id="search-input"
    [(ngModel)]="searchText"
    type="text"
    placeholder="Search for an element..."
    class="pl-10 pr-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-300 w-64"
    (input)="search()"
  />
  <svg
    xmlns="http://www.w3.org/2000/svg"
    class="h-5 w-5 text-gray-400 absolute left-3 top-2.5"
    fill="none"
    viewBox="0 0 24 24"
    stroke="currentColor"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="2"
      d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
    />
  </svg>
</div>




      <div class="relative">
        <button
          (click)="toggleDropdown()"
          class="flex items-center px-3 py-2 text-blue-100 hover:bg-blue-200 hover:text-white rounded-lg transition-all duration-200 group">
          <div class="flex items-center">
            <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold text-sm">
              MD
            </div>
            <span class="ml-2 text-sm font-medium text-gray-700 group-hover:text-white">Doctor</span>
            <svg
              [ngClass]="{'transform rotate-180': isOpen}"
              class="h-5 w-5 text-gray-400 group-hover:text-white ml-2 transition-transform duration-200"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 20 20"
              fill="currentColor">
              <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
            </svg>
          </div>
        </button>

        <div
          *ngIf="isOpen"
          class="fixed right-8  top-16 mt-2  bg-white rounded-lg shadow-xl border border-gray-100 overflow-hidden z-[100]">
          <div class="px-4 py-3 border-b border-gray-100 bg-gray-50">
            <div class="flex items-center">
              <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold text-sm">
                MD
              </div>
              <div class="ml-6 flex flex-col">
                <p class="text-sm font-medium text-gray-900">Doctor {{name}}</p>
                <p class="text-xs text-gray-500">{{email}}</p>
              </div>
            </div>
          </div>

          <div class="py-1">
            <a href="app-admin-profile" class="flex items-center px-4 py-2.5 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-700 transition-colors duration-200">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
              Profile
            </a>

            <a href="#" (click)="logout()" class="flex items-center px-4 py-2.5 text-sm text-gray-700 hover:bg-red-50 hover:text-red-700 transition-colors duration-200">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
              Logout
            </a>
          </div>
        </div>
      </div>
    </div>
  </header>
</main>
